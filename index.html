<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-spell-check"></i> WORDLE</h1>
            <div class="game-info">
                <button id="new-game-btn" class="btn" title="New Game">
                    <i class="fas fa-redo"></i> New Game
                </button>
                <button id="help-btn" class="btn" title="How to Play">
                    <i class="fas fa-question-circle"></i>
                </button>
                <div id="message" class="message"></div>
            </div>
        </header>

        <main>
            <div class="game-board">
                <div class="grid" id="grid">
                    <!-- 6 rows of 5 tiles each -->
                    <!-- Tiles are generated by JavaScript -->
                </div>
            </div>

            <div class="keyboard">
                <div class="keyboard-row">
                    <button data-key="Q">Q</button>
                    <button data-key="W">W</button>
                    <button data-key="E">E</button>
                    <button data-key="R">R</button>
                    <button data-key="T">T</button>
                    <button data-key="Y">Y</button>
                    <button data-key="U">U</button>
                    <button data-key="I">I</button>
                    <button data-key="O">O</button>
                    <button data-key="P">P</button>
                </div>
                <div class="keyboard-row">
                    <button data-key="A">A</button>
                    <button data-key="S">S</button>
                    <button data-key="D">D</button>
                    <button data-key="F">F</button>
                    <button data-key="G">G</button>
                    <button data-key="H">H</button>
                    <button data-key="J">J</button>
                    <button data-key="K">K</button>
                    <button data-key="L">L</button>
                </div>
                <div class="keyboard-row">
                    <button data-key="Enter" class="enter-key">
                        <i class="fas fa-arrow-right"></i> ENTER
                    </button>
                    <button data-key="Z">Z</button>
                    <button data-key="X">X</button>
                    <button data-key="C">C</button>
                    <button data-key="V">V</button>
                    <button data-key="B">B</button>
                    <button data-key="N">N</button>
                    <button data-key="M">M</button>
                    <button data-key="Backspace" class="backspace-key">
                        <i class="fas fa-backspace"></i>
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p class="instructions">
                <strong>How to play:</strong> Guess the 5‑letter word in 6 tries. 
                Green = correct letter & position, Yellow = letter in word, Gray = letter not in word.
            </p>
            <p class="credits">
                Wordle clone &copy; 2026 - Built by Dev Agent for Veridian ERP
            </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
